services:
  postgres:
    image: postgres:16
    container_name: coffee-forum-db
    environment:
      POSTGRES_DB: coffee_forum
      POSTGRES_USER: coffee_admin
      POSTGRES_PASSWORD: localdevpassword
    ports:
      - "5433:5432"
    volumes:
      - coffee-forum-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: coffee-forum-cache
    ports:
      - "6379:6379"

  app:
    build: ./concurrent-content-service
    container_name: coffee-forum-app
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/coffee_forum
      SPRING_DATASOURCE_USERNAME: coffee_admin
      SPRING_DATASOURCE_PASSWORD: localdevpassword
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

volumes:
  coffee-forum-data: